<!DOCTYPE html>
<html>
<head>
    <title>Canvas Drawing App</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background-color:orange; }
        canvas { border: 2px solid #333; cursor: crosshair; background: #fff; }
        .controls { margin: 10px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <h2>Interactive Drawing Canvas</h2>
    <div class="controls">
        <input type="color" id="colorPicker" value="#000000">
        <button id="clearBtn">Clear Screen</button>
    </div>
    <canvas id="drawCanvas" width="600" height="400"></canvas>

</body>
</html>
