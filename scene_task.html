<!DOCTYPE html>
<html>
<head>
    <title>Canvas Scene</title>
</head>
<body>

<h2>My First Graphics Scene</h2>

<canvas id="myCanvas" width="500" height="350" style="border:1px solid black;"></canvas>

<script>
let canvas = document.getElementById("myCanvas");
let ctx = canvas.getContext("2d");


// Sky (Background)
ctx.fillStyle = "red";
ctx.fillRect(0, 0, 2, 2);


// Ground
ctx.fillStyle = "green";
ctx.fillRect(0, 250, 500, 100);


// Sun
ctx.beginPath();
ctx.arc(80, 80, 40, 0, 2 * Math.PI);
ctx.fillStyle = "yellow";
ctx.fill();
ctx.closePath();


// House Body
ctx.fillStyle = "brown";
ctx.fillRect(200, 180, 120, 80);


// Roof
ctx.beginPath();
ctx.moveTo(200, 180);
ctx.lineTo(320, 180);
ctx.lineTo(260, 130);
ctx.closePath();
ctx.fillStyle = "red";
ctx.fill();


// Door
ctx.fillStyle = "black";
ctx.fillRect(245, 210, 30, 50);


// Window
ctx.fillStyle = "white";
ctx.fillRect(215, 200, 25, 25);
ctx.fillRect(285, 200, 25, 25);

</script>

</body>
</html>
